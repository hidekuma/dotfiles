name: lint-shell

on:
  push:
    paths:
      - '**/*.sh'
      - 'zshrc'
      - 'zsh_profile*'
  pull_request:
    paths:
      - '**/*.sh'
      - 'zshrc'
      - 'zsh_profile*'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          ignore_names: >-
            zshrc
            zsh_profile
            zsh_profile.m1
            zsh_profile.window

  zsh-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Check zsh syntax (zsh -n)
        run: |
          for f in zshrc zsh_profile zsh_profile.m1 zsh_profile.window; do
            if [ -f "$f" ]; then
              echo "Checking $f..."
              zsh -n "$f"
            fi
          done
