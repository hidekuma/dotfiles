name: shellcheck

on:
  push:
    paths:
      - '**/*.sh'
      - 'zshrc'
      - 'zsh_profile*'
  pull_request:
    paths:
      - '**/*.sh'
      - 'zshrc'
      - 'zsh_profile*'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
